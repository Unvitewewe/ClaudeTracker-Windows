<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Tracker – Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .info-banner {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px 20px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #aaa;
      text-align: center;
      max-width: 400px;
    }
    .info-banner strong { color: #c084fc; }
    .webview-container {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    webview {
      flex: 1;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="info-banner">
    Sign in to <strong>claude.ai</strong> below. The window will close automatically once you're logged in.
  </div>
  <!-- The actual login happens in a BrowserWindow that shares the claude-tracker session.
       This HTML is just a wrapper shown briefly; the real login page is loaded via loadURL. -->
</body>
</html>
